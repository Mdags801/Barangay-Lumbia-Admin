<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Log in — Barangay Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="auth.css">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase client once SDK is parsed
    window.supabaseClient = supabase.createClient(
      "https://tukkkwtxuaxrbihyammp.supabase.co",
      "sb_publishable_23puPo1jOwFggf-4YTitRg_BQiGQl9P",
      { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false } }
    );
    console.log("[Supabase] Client initialized (login)");
  </script>

  <style>
    /* Buttons */

    input,
    button {
      transition: box-shadow .12s ease, transform .08s ease;
    }

    button:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>
  <main class="auth-shell" role="main">
    <div class="auth-card" aria-labelledby="authTitle">
      <section class="auth-form" aria-label="Login form">
        <div class="brand">
          <div class="logo">BD</div>
          <div>
            <div style="font-weight:800">Barangay Based Emergency Response System</div>
            <div class="small">Admin Portal</div>
          </div>
        </div>

        <h1 id="authTitle">Log in to your Account</h1>
        <p class="lead">Welcome back!</p>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>

        <div class="field" id="passwordField">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••"
            required />
        </div>

        <div class="controls-row">
          <label class="checkbox"><input id="remember" type="checkbox" /> Remember me</label>
          <button id="forgotLink" class="link-btn" type="button">Forgot Password?</button>
        </div>

        <div class="actions">
          <button id="loginBtn" class="btn-primary">Log In</button>
          <button id="toSignup" class="btn-ghost">Create an account</button>
        </div>

        <div id="msg" aria-live="polite" style="margin-top:12px"></div>
      </section>

      <aside class="auth-visual" aria-hidden="true">
        <div>
          <div class="visual-top">
            <div style="font-weight:800;font-size:1.05rem">Rapid Emergency Response</div>
          </div>
          <div class="visual-icons">
            <div class="visual-icon">🛡️</div>
            <div class="visual-icon">📞</div>
            <div class="visual-icon">📍</div>
            <div class="visual-icon">📊</div>
          </div>
          <div class="visual-tagline">
            Everything you need in an easily customizable dashboard for your barangay.
          </div>
        </div>
        <div class="small">Secure access for authorized personnel only.</div>
      </aside>
    </div>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Login logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const supabase = window.supabaseClient;
      const emailEl = document.getElementById('email');
      const passwordEl = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const toSignup = document.getElementById('toSignup');
      const forgotLink = document.getElementById('forgotLink');
      const msgBox = document.getElementById('msg');

      function showMsg(text, isError = false) {
        if (msgBox) {
          msgBox.textContent = text;
          msgBox.style.color = isError ? '#b00020' : '#0a7a0a';
        }
        console.log('[login]', text);
      }

      if (toSignup) {
        toSignup.addEventListener('click', () => window.location.href = 'signup.html');
      }
      if (forgotLink) {
        forgotLink.addEventListener('click', () => window.location.href = 'reset.html');
      }

      // Check for security error params
      const params = new URLSearchParams(window.location.search);
      if (params.get('error') === 'access_denied') {
        showMsg('Access Denied: This portal is for administrative personnel only.', true);
      }

      loginBtn.addEventListener('click', async (ev) => {
        ev.preventDefault();
        const email = (emailEl?.value || '').trim();
        const password = (passwordEl?.value || '').trim();

        if (!email) {
          showMsg('Please enter your email address', true);
          emailEl.focus();
          return;
        }
        if (!password) {
          showMsg('Please enter your password', true);
          passwordEl.focus();
          return;
        }

        if (!supabase) {
          showMsg('Authentication client not initialized.', true);
          return;
        }

        const originalBtnText = loginBtn.textContent;
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
        showMsg('Authenticating...');

        try {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          console.log('[Supabase] signIn response:', data, error);

          if (error) {
            showMsg(error.message || 'Login failed', true);
            loginBtn.disabled = false;
            loginBtn.textContent = originalBtnText;
            return;
          }

          // Check Role Restriction
          const { data: profile } = await supabase.from('profiles').select('role').eq('id', data.user.id).single();
          const role = (profile?.role || 'staff').toLowerCase();

          if (role === 'citizen' || role === 'responder') {
            await supabase.auth.signOut();
            showMsg('Access Denied: This portal is for administrative personnel only.', true);
            loginBtn.disabled = false;
            loginBtn.textContent = originalBtnText || 'Log In';
            return;
          }

          // Redirect on success
          showMsg('Login successful! Redirecting...');
          setTimeout(() => window.location.href = 'index.html', 1000);
        } catch (err) {
          console.error('[Supabase] signIn exception:', err);
          showMsg('Unexpected error during login', true);
        }
      });

    });
  </script>
</body>

</html>
