<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Requests — Barangay Admin</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .requests-container {
      padding: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .request-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 24px;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .request-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .user-avatar {
      width: 60px;
      height: 60px;
      background: #f1f5f9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #64748b;
    }

    .user-info h3 {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }

    .user-info p {
      margin: 0;
      color: #64748b;
      font-size: 0.9rem;
    }

    .role-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .role-citizen { background: #e0f2fe; color: #0369a1; }
    .role-responder { background: #fef3c7; color: #92400e; }
    .role-staff { background: #f1f5f9; color: #475569; }

    .id-preview {
      width: 120px;
      height: 80px;
      background: #f8fafc;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .id-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .id-preview i {
      font-size: 1.5rem;
      color: #cbd5e1;
    }

    .id-label {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.5);
      color: white;
      font-size: 0.6rem;
      text-align: center;
      padding: 2px 0;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn-approve {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-approve:hover { background: #059669; }

    .btn-reject {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reject:hover { background: #dc2626; }

    .empty-state {
      text-align: center;
      padding: 100px 20px;
      color: #94a3b8;
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    /* Modal for ID preview */
    .id-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .id-viewer img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
    }

    .id-viewer-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body style="background: #f8fafc;">

  <div class="requests-container">
    <div class="page-header">
      <div>
        <h1 style="margin:0; font-size:1.8rem; color:#0f172a;">Account Requests</h1>
        <p style="margin:4px 0 0; color:#64748b;">Review and verify new registrations from the apps and website.</p>
      </div>
      <button onclick="fetchRequests()" class="btn-ghost" style="padding: 8px 16px;">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <div id="requestsList">
      <div style="text-align:center; padding:100px;">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem; color:#64748b;"></i>
        <p>Fetching pending requests...</p>
      </div>
    </div>
  </div>

  <div id="idViewer" class="id-viewer" onclick="this.style.display='none'">
    <span class="id-viewer-close">&times;</span>
    <img id="idLargeImage" src="" alt="ID Full View">
  </div>

  <script>
    const SUPABASE_URL = "https://tukkkwtxuaxrbihyammp.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_23puPo1jOwFggf-4YTitRg_BQiGQl9P";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function fetchRequests() {
      const container = document.getElementById('requestsList');
      
      try {
        const { data, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('status', 'Pending')
          .order('id', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-user-check"></i>
              <h2>All caught up!</h2>
              <p>There are no pending account requests at the moment.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = '';
        data.forEach(req => {
          const card = document.createElement('div');
          card.className = 'request-card';
          
          const roleClass = `role-${(req.role || 'citizen').toLowerCase()}`;
          const initials = (req.full_name || 'U').charAt(0).toUpperCase();

          card.innerHTML = `
            <div class="user-avatar">${initials}</div>
            <div class="user-info">
              <h3>${req.full_name || 'Unnamed User'}</h3>
              <p><i class="fas fa-envelope"></i> ${req.email}</p>
              <span class="role-badge ${roleClass}">${req.role || 'Citizen'}</span>
            </div>
            <div style="display:flex; align-items:center; gap:24px;">
              <div class="id-preview" onclick="viewID('${req.id_url}')">
                ${req.id_url ? `<img src="${req.id_url}" alt="ID">` : `<i class="fas fa-image"></i>`}
                <div class="id-label">VIEW ID</div>
              </div>
              <div class="actions">
                <button class="btn-approve" onclick="handleAction('${req.id}', 'Active')">Approve</button>
                <button class="btn-reject" onclick="handleAction('${req.id}', 'Rejected')">Reject</button>
              </div>
            </div>
          `;
          container.appendChild(card);
        });

      } catch (err) {
        console.error('Error fetching requests:', err);
        container.innerHTML = `<p style="color:red; text-align:center;">Failed to load requests: ${err.message}</p>`;
      }
    }

    function viewID(url) {
      if (!url || url === 'null') {
        alert('No ID was uploaded for this account.');
        return;
      }
      document.getElementById('idLargeImage').src = url;
      document.getElementById('idViewer').style.display = 'flex';
    }

    async function handleAction(userId, newStatus) {
      const confirmMsg = newStatus === 'Active' ? 'Approve this account?' : 'Reject and disable this account?';
      if (!confirm(confirmMsg)) return;

      try {
        const { error } = await supabase
          .from('profiles')
          .update({ status: newStatus })
          .eq('id', userId);

        if (error) throw error;

        alert(newStatus === 'Active' ? 'Account approved!' : 'Account rejected.');
        fetchRequests();
      } catch (err) {
        alert('Action failed: ' + err.message);
      }
    }

    // Refresh automatically if status changes somewhere else
    supabase
      .channel('requests-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => {
        fetchRequests();
      })
      .subscribe();

    document.addEventListener('DOMContentLoaded', fetchRequests);
  </script>
</body>
</html>
